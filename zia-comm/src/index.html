<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>ZiaComm – Intelligence Commerciale & Marketing Digital</title>

    <meta
      name="description"
      content="Zia Comm vous accompagne dans l'intelligence commerciale automatisée, les stratégies marketing, la digitalisation des processus, les solutions SaaS et la formation en intelligence artificielle pour booster votre performance et croissance."
    />

    <base href="/" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <link
      rel="preload"
      as="image"
      href="assets/Pictures/pic.webp"
      fetchpriority="high"
    />

    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"
      />
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css"
      />
    </noscript>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
               img-src 'self' data: blob: https://*.googleusercontent.com;
               font-src 'self' https://cdnjs.cloudflare.com;
               connect-src 'self' https://docs.google.com https://*.googleusercontent.com;"
    />

    <link rel="alternate" hreflang="fr" href="https://yourdomain.com/fr/" />
    <link rel="alternate" hreflang="ar" href="https://yourdomain.com/ar/" />
    <link rel="alternate" hreflang="en" href="https://yourdomain.com/en/" />
    <link rel="alternate" hreflang="x-default" href="https://yourdomain.com/" />
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
